<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LYBS Cards — Open Your Pack</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Michroma&family=Anton&family=Oswald:wght@400;500;600;700&family=Source+Serif+4:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#00275e;--red:#D81E2C;--gold:#C5973A;--ink:#0a0d14}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:"Oswald",sans-serif;background:#05070d;color:#fff;user-select:none}
body{position:fixed;inset:0}

/* Animated cosmic background */
#bgGlow{position:fixed;inset:0;z-index:0;transition:background 1.2s ease;
  background:radial-gradient(ellipse at 50% 40%,rgba(0,39,94,.5),transparent 70%),#05070d}
#bgGlow::after{content:"";position:absolute;inset:0;opacity:.5;
  background:radial-gradient(2px 2px at 20% 30%,#fff,transparent),
  radial-gradient(2px 2px at 60% 70%,#fff,transparent),
  radial-gradient(1px 1px at 50% 50%,#fff,transparent),
  radial-gradient(1px 1px at 80% 20%,#fff,transparent),
  radial-gradient(2px 2px at 90% 60%,#fff,transparent),
  radial-gradient(1px 1px at 33% 80%,#fff,transparent);
  background-size:200px 200px;animation:stars 60s linear infinite}
@keyframes stars{to{background-position:200px 400px}}

.screen{position:fixed;inset:0;z-index:1;display:none;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}

/* ── Top bar ── */
.topbar{position:fixed;top:0;left:0;right:0;height:54px;z-index:40;display:flex;align-items:center;justify-content:space-between;padding:0 18px;
  background:linear-gradient(180deg,rgba(0,0,0,.6),transparent)}
.tb-logo{font-family:"Anton",sans-serif;font-size:20px;letter-spacing:3px}
.tb-logo span{color:var(--gold)}
.tb-actions{display:flex;gap:8px;align-items:center}
.tb-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;
  padding:7px 14px;border-radius:20px;font-family:"Oswald";font-size:11px;letter-spacing:1.5px;cursor:pointer;transition:.2s}
.tb-btn:hover{background:rgba(255,255,255,.16)}
.tb-btn.gold{background:var(--gold);border-color:var(--gold);color:#000;font-weight:600}

/* ── PACK ── */
#packScreen{cursor:pointer}
.pack-prompt{position:absolute;bottom:14%;font-family:"Michroma";font-size:13px;letter-spacing:4px;
  color:rgba(255,255,255,.6);animation:pulse 2s ease-in-out infinite;text-align:center}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.foil-pack{width:300px;height:420px;position:relative;transform-style:preserve-3d;
  animation:packFloat 4s ease-in-out infinite;transition:transform .4s}
@keyframes packFloat{0%,100%{transform:translateY(0) rotateZ(-1deg)}50%{transform:translateY(-16px) rotateZ(1deg)}}
.foil-pack.opening{animation:packShake .5s ease-in-out}
@keyframes packShake{0%,100%{transform:translateX(0) rotate(0)}20%{transform:translateX(-8px) rotate(-3deg)}40%{transform:translateX(8px) rotate(3deg)}60%{transform:translateX(-6px) rotate(-2deg)}80%{transform:translateX(6px) rotate(2deg)}}
.foil-pack-inner{position:absolute;inset:0;border-radius:16px;overflow:hidden;
  background:linear-gradient(150deg,#0a0a0c,#1a1a1f 30%,#050506 55%,#222227 75%,#08080a);
  background-size:200% 200%;animation:foilShine 5s ease-in-out infinite;
  box-shadow:0 30px 90px rgba(0,0,0,.85),inset 0 2px 30px rgba(255,255,255,.12),inset 0 -4px 24px rgba(0,0,0,.6);
  border:1px solid rgba(255,255,255,.08)}
@keyframes foilShine{0%,100%{background-position:0% 0%}50%{background-position:100% 100%}}
.foil-pack-inner::before{content:"";position:absolute;inset:0;opacity:.4;
  background:repeating-linear-gradient(115deg,transparent,transparent 14px,rgba(255,255,255,.04) 14px,rgba(255,255,255,.04) 28px)}
/* moving silver sheen sweep */
.foil-pack-inner::after{content:"";position:absolute;top:-50%;left:-60%;width:60%;height:200%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.22),rgba(255,255,255,.05),transparent);
  transform:rotate(8deg);animation:sheen 4.5s ease-in-out infinite}
@keyframes sheen{0%{left:-60%}55%,100%{left:130%}}
.pack-logo{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;padding:24px;z-index:2}
.pack-s{width:120px;height:auto;margin-bottom:6px;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,.6));
  /* recolor black S to silver-white gradient via mask */}
.pack-title{font-family:"Anton",sans-serif;font-size:38px;letter-spacing:3px;line-height:.92;
  background:linear-gradient(180deg,#ffffff,#c8ccd4 45%,#888d98 75%,#e8eaef);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 2px 10px rgba(0,0,0,.4)}
.pack-title span{display:block;font-size:42px;
  background:linear-gradient(180deg,#f0f0f4,#aab0bc 50%,#6a6f7a);
  -webkit-background-clip:text;background-clip:text;color:transparent}
.series{font-family:"Michroma",sans-serif;font-size:10px;letter-spacing:5px;color:rgba(255,255,255,.55);margin-top:12px}
.pack-bolts{display:flex;gap:18px;margin-top:20px;font-size:20px;opacity:.5;filter:grayscale(1) brightness(2)}
/* Light rays behind pack */
.pack-rays{position:absolute;top:50%;left:50%;width:600px;height:600px;transform:translate(-50%,-50%) scale(0);
  background:repeating-conic-gradient(from 0deg,rgba(255,255,255,.18) 0deg,transparent 6deg,transparent 12deg,rgba(255,255,255,.18) 18deg);
  border-radius:50%;opacity:0;z-index:1;pointer-events:none}
.foil-pack.peeling ~ .pack-rays,.peeling .pack-rays{}
.pack-rays.go{animation:raysGo 1.4s ease-out forwards}
@keyframes raysGo{0%{opacity:0;transform:translate(-50%,-50%) scale(0) rotate(0)}30%{opacity:.9}100%{opacity:0;transform:translate(-50%,-50%) scale(2.4) rotate(60deg)}}
/* Pack halves */
.pack-half{position:absolute;top:0;height:100%;width:50%;overflow:hidden;z-index:3;
  transition:transform .8s cubic-bezier(.6,0,.3,1),opacity .8s}
.pack-half-l{left:0;border-radius:16px 0 0 16px;transform-origin:left center}
.pack-half-r{right:0;border-radius:0 16px 16px 0;transform-origin:right center}
.pack-half-inner{position:absolute;top:0;height:100%;width:300px;
  background:linear-gradient(150deg,#0a0a0c,#1a1a1f 30%,#050506 55%,#222227 75%,#08080a);
  box-shadow:inset 0 2px 30px rgba(255,255,255,.12),inset 0 -4px 24px rgba(0,0,0,.6);
  border:1px solid rgba(255,255,255,.08)}
.pack-half-l .pack-half-inner{left:0;border-radius:16px 0 0 16px}
.pack-half-r .pack-half-inner{right:0;border-radius:0 16px 16px 0}
.pack-half-inner::after{content:"";position:absolute;top:-50%;left:-60%;width:60%;height:200%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.22),rgba(255,255,255,.05),transparent);
  transform:rotate(8deg);animation:sheen 4.5s ease-in-out infinite}
.pack-logo{position:absolute;top:0;height:100%;width:300px;left:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;padding:24px;z-index:2}
.pack-half-r .pack-logo{left:-300px}
/* Seam glow line down the middle */
.pack-seam{position:absolute;top:0;left:50%;width:3px;height:100%;transform:translateX(-50%);z-index:4;opacity:0;
  background:linear-gradient(180deg,transparent,#fff,#bcd8ff,#fff,transparent);
  box-shadow:0 0 20px 6px rgba(180,216,255,.8)}
/* PEEL animation */
.foil-pack.peeling .pack-seam{animation:seamFlash .5s ease-out}
@keyframes seamFlash{0%{opacity:0}40%{opacity:1}100%{opacity:0}}
.foil-pack.peeling .pack-half-l{transform:translateX(-60px) rotateY(55deg) scale(.95);opacity:0}
.foil-pack.peeling .pack-half-r{transform:translateX(60px) rotateY(-55deg) scale(.95);opacity:0}
/* Particles */
.pack-particles{position:absolute;top:50%;left:50%;width:0;height:0;z-index:2;pointer-events:none}
.pack-particles span{position:absolute;width:8px;height:8px;border-radius:50%;
  background:radial-gradient(circle,#fff,#bcd8ff);opacity:0}
.pack-particles.go span{animation:particleFly .9s ease-out forwards}
@keyframes particleFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0)}}
/* Big card reveal flash */
.reveal-flash{position:fixed;inset:0;background:radial-gradient(circle,rgba(255,255,255,.95),transparent 60%);
  opacity:0;z-index:200;pointer-events:none}
.reveal-flash.go{animation:flashGo .7s ease-out}
@keyframes flashGo{0%{opacity:0}20%{opacity:1}100%{opacity:0}}
.card-holder.revealing{animation:cardReveal .8s cubic-bezier(.2,.8,.3,1)}
@keyframes cardReveal{0%{transform:scale(.3) rotateY(180deg);opacity:0;filter:brightness(3)}
  40%{opacity:1}60%{filter:brightness(1.6)}100%{transform:scale(1) rotateY(0);opacity:1;filter:brightness(1)}}
.card-holder.nav-in{animation:navIn .35s ease}
@keyframes navIn{0%{opacity:.4;transform:scale(.96)}100%{opacity:1;transform:scale(1)}}40%{opacity:1}100%{opacity:1;transform:translateY(-70px) scale(1)}}
@keyframes burst{0%{opacity:0;transform:scale(.3)}40%{opacity:1}100%{opacity:0;transform:scale(2.5)}}

/* ── REVEAL / card viewer ── */
#revealScreen{justify-content:center;gap:0}
.reveal-stage{position:relative;display:flex;flex-direction:column;align-items:center;gap:18px;z-index:2}
.card-counter{font-family:"Michroma";font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.5)}
.card-holder{position:relative;perspective:1200px;cursor:grab}
.card-holder:active{cursor:grabbing}
.card-holder canvas{display:block;width:300px;height:421px;border-radius:8px;
  transition:transform .1s ease-out;will-change:transform}
.card-glow-ring{position:absolute;inset:-30px;border-radius:50%;z-index:-1;
  filter:blur(40px);opacity:.7;transition:background 1s ease}
.reveal-actions{display:flex;gap:10px;align-items:center;margin-top:6px}
.rv-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;
  width:52px;height:52px;border-radius:50%;font-size:20px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center}
.rv-btn:hover{background:rgba(255,255,255,.2);transform:scale(1.08)}
.rv-btn:disabled{opacity:.25;cursor:not-allowed;transform:none}
.save-btn{background:linear-gradient(135deg,var(--gold),#e0b450);color:#000;border:none;
  padding:14px 28px;border-radius:30px;font-family:"Oswald";font-weight:700;font-size:14px;letter-spacing:2px;
  cursor:pointer;transition:.2s;box-shadow:0 8px 24px rgba(197,151,58,.4)}
.save-btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(197,151,58,.6)}
.save-btn.saved{background:rgba(80,200,120,.25);color:#7fe;border:1px solid rgba(80,200,120,.5);box-shadow:none;cursor:default}
.flip-hint{font-family:"Michroma";font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.3);margin-top:2px}
.parallel-tag{font-family:"Michroma";font-size:11px;letter-spacing:3px;padding:5px 14px;border-radius:4px;
  border:1px solid rgba(255,255,255,.15);transition:.4s;text-align:center}

/* ── Slab / save animation ── */
#slabOverlay{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.85);backdrop-filter:blur(8px)}
#slabOverlay.active{display:flex}
.slab{position:relative;width:320px;height:448px;transform:scale(.3);opacity:0}
.slab.animate{animation:slabIn 1.6s cubic-bezier(.2,.8,.2,1) forwards}
@keyframes slabIn{0%{transform:scale(.3) rotateY(180deg);opacity:0}
  40%{opacity:1}60%{transform:scale(1.05) rotateY(0)}100%{transform:scale(1) rotateY(0);opacity:1}}
.slab-case{position:absolute;inset:-14px;border-radius:14px;
  background:linear-gradient(135deg,rgba(255,255,255,.25),rgba(255,255,255,.05) 40%,rgba(255,255,255,.18));
  border:2px solid rgba(255,255,255,.35);box-shadow:0 20px 60px rgba(0,0,0,.6),inset 0 0 40px rgba(255,255,255,.1)}
.slab-case::before{content:"";position:absolute;top:14px;left:50%;transform:translateX(-50%);
  width:60px;height:18px;border-radius:9px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3)}
.slab canvas{position:absolute;inset:0;width:100%;height:100%;border-radius:6px}
.slab-label{position:absolute;bottom:-46px;left:0;right:0;text-align:center;font-family:"Michroma";
  font-size:11px;letter-spacing:3px;color:var(--gold);opacity:0;animation:fadeUp .6s ease 1.2s forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── Collection / display case ── */
#caseScreen{justify-content:flex-start;padding-top:70px;overflow-y:auto;display:none}
#caseScreen.active{display:flex}
.case-head{text-align:center;margin-bottom:8px;padding:0 20px}
.case-head h2{font-family:"Anton";font-size:30px;letter-spacing:3px}
.case-head p{font-family:"Michroma";font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.4);margin-top:4px}
.case-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;
  padding:18px;max-width:900px;width:100%;margin:0 auto}
.case-card{position:relative;border-radius:8px;overflow:hidden;cursor:pointer;transition:.25s;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);aspect-ratio:712/1000}
.case-card:hover{transform:translateY(-4px) scale(1.03);box-shadow:0 12px 30px rgba(0,0,0,.5)}
.case-card canvas{width:100%;height:100%;display:block}
.case-card .cc-par{position:absolute;bottom:4px;right:4px;font-family:"Michroma";font-size:6px;
  letter-spacing:1px;padding:2px 5px;border-radius:2px;color:#fff}
.case-empty{text-align:center;color:rgba(255,255,255,.4);padding:60px 20px;font-family:"Michroma";font-size:12px;letter-spacing:2px}

/* ── Auth modal ── */
.modal-ov{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.8);backdrop-filter:blur(6px);padding:20px}
.modal-ov.active{display:flex}
.modal{background:#0f1420;border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:32px 28px;
  width:100%;max-width:380px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.modal h2{font-family:"Anton";font-size:26px;letter-spacing:2px;margin-bottom:6px}
.modal p{font-family:"Oswald";font-size:12px;color:rgba(255,255,255,.5);letter-spacing:1px;margin-bottom:22px}
.modal input{width:100%;padding:13px 16px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.15);
  border-radius:8px;color:#fff;font-family:"Oswald";font-size:14px;margin-bottom:12px}
.modal input:focus{outline:none;border-color:var(--gold)}
.modal-btn{width:100%;padding:13px;background:var(--gold);color:#000;border:none;border-radius:8px;
  font-family:"Oswald";font-weight:700;font-size:14px;letter-spacing:2px;cursor:pointer;margin-bottom:10px}
.modal-btn:hover{background:#d4a850}
.modal-toggle{font-family:"Oswald";font-size:12px;color:rgba(255,255,255,.5);cursor:pointer;letter-spacing:1px}
.modal-toggle b{color:var(--gold)}
.modal-err{font-family:"Oswald";font-size:11px;color:#ff6b6b;min-height:16px;margin-bottom:8px}
.modal-close{position:absolute;top:16px;right:20px;font-size:24px;color:rgba(255,255,255,.4);cursor:pointer;background:none;border:none}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);z-index:90;
  background:rgba(20,25,40,.95);border:1px solid rgba(255,255,255,.15);color:#fff;padding:12px 22px;border-radius:30px;
  font-family:"Oswald";font-size:13px;letter-spacing:1px;opacity:0;transition:.3s;border-left:3px solid var(--gold)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--gold);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:#05070d}
</style>
</head>
<body>
<div id="bgGlow"></div>

<div class="loading-screen" id="loadingScreen"><div class="spinner"></div></div>
<script>
// Hard failsafe — runs independently of the main app. If the app crashes on load,
// this still removes the spinner so the user never sees an infinite wheel.
window.addEventListener('load',function(){
  setTimeout(function(){
    var ls=document.getElementById('loadingScreen');
    if(ls && ls.style.display!=='none'){ ls.style.display='none'; }
    var pk=document.getElementById('packScreen');
    if(pk && !pk.classList.contains('active')){ pk.classList.add('active'); }
    var tb=document.getElementById('topbar');
    if(tb){ tb.style.display='flex'; }
  }, 7000);
});
// Surface any uncaught error visibly instead of silently hanging
window.addEventListener('error',function(e){
  console.error('Receiver error:',e.message,e.filename,e.lineno);
});
</script>

<!-- Top bar -->
<div class="topbar" id="topbar" style="display:none">
  <div class="tb-logo">LYBS <span>CARDS</span><span style="font-size:8px;opacity:.4;margin-left:6px">v2</span></div>
  <div class="tb-actions">
    <button class="tb-btn" id="caseBtn" onclick="showCase()" style="display:none">MY COLLECTION</button>
    <button class="tb-btn gold" id="authBtn" onclick="openAuth()">SIGN IN</button>
  </div>
</div>

<!-- PACK SCREEN -->
<div class="screen" id="packScreen" onclick="openPack()">
  <div class="pack-rays" id="packRays"></div>
  <div class="foil-pack" id="foilPack">
    <!-- Left half -->
    <div class="pack-half pack-half-l" id="packHalfL">
      <div class="pack-half-inner">
        <div class="pack-logo">
          <img id="packSLogo" class="pack-s" alt="S">
          <h1 class="pack-title">STEELE<span>CARDS</span></h1>
          <div class="series">2026 &middot; SERIES ONE</div>
          <div class="pack-bolts"><span>&#x26A1;</span><span>&#x26A1;</span><span>&#x26A1;</span></div>
        </div>
      </div>
    </div>
    <!-- Right half -->
    <div class="pack-half pack-half-r" id="packHalfR">
      <div class="pack-half-inner"></div>
    </div>
    <!-- Seam glow -->
    <div class="pack-seam" id="packSeam"></div>
  </div>
  <div class="pack-particles" id="packParticles"></div>
  <div class="pack-prompt">TAP TO RIP OPEN</div>
</div>
<div class="pack-burst" id="packBurst"></div>

<!-- REVEAL SCREEN -->
<div class="screen" id="revealScreen">
  <div class="reveal-stage">
    <div class="card-counter" id="cardCounter">CARD 1 OF 5</div>
    <div class="parallel-tag" id="parallelTag">BASE</div>
    <div class="card-holder" id="cardHolder">
      <div class="card-glow-ring" id="glowRing"></div>
      <canvas id="revealCanvas" width="712" height="1000"></canvas>
    </div>
    <div class="flip-hint">TAP CARD TO FLIP · DRAG TO TILT</div>
    <div class="reveal-actions">
      <button class="rv-btn" id="prevBtn" onclick="prevCard()">‹</button>
      <button class="save-btn" id="saveBtn" onclick="saveToCollection()">★ SAVE TO COLLECTION</button>
      <button class="rv-btn" id="nextBtn" onclick="nextCard()">›</button>
    </div>
  </div>
</div>

<!-- SLAB SAVE OVERLAY -->
<div id="slabOverlay">
  <div class="slab" id="slab">
    <div class="slab-case"></div>
    <canvas id="slabCanvas" width="712" height="1000"></canvas>
    <div class="slab-label">SAVED TO COLLECTION</div>
  </div>
</div>

<!-- COLLECTION / CASE SCREEN -->
<div class="screen" id="caseScreen">
  <div class="case-head">
    <h2>MY COLLECTION</h2>
    <p id="caseCount">0 CARDS</p>
  </div>
  <div class="case-grid" id="caseGrid"></div>
</div>

<!-- AUTH MODAL -->

function firebaseConfigured(){
  try{ return !String(firebaseConfig.apiKey||'').startsWith('YOUR_'); }catch(e){ return false; }
}

async function buildPack(){
  // Wait for layers
  if(!layersReady){setTimeout(buildPack,150);return;}

  // If Firebase isn't configured yet, run entirely on demo cards.
  if(!firebaseConfigured()){
    PACK=shuffleTake(DEMO_CARDS.slice(),5);
    finishBuildPack();
    return;
  }

  try{
    const snap=await Promise.race([
      window._db.collection('players').get(),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),8000))
    ]);
    let all=[];snap.forEach(d=>all.push({id:d.id,...d.data()}));
    if(all.length===0){ all=DEMO_CARDS.slice(); }
    PACK=shuffleTake(all,5);
    try{ await Promise.race([
      Promise.all(PACK.map(preloadCardImages)),
      new Promise(res=>setTimeout(res,6000))
    ]); }catch(e){}
  }catch(e){
    console.error('Pack build error — using demo cards',e);
    PACK=shuffleTake(DEMO_CARDS.slice(),5);
  }
  finishBuildPack();
}

function shuffleTake(arr,n){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr.slice(0,Math.min(n,arr.length));
}

function finishBuildPack(){
  window._packBrowsed=false;
  try{var sl=document.getElementById('packSLogo');if(sl&&LAYER_SRCS.steele_s_silver)sl.src=LAYER_SRCS.steele_s_silver;}catch(e){}
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('topbar').style.display='flex';
  document.getElementById('packScreen').classList.add('active');
}

function preloadCardImages(card){
  const urls=[card.photoURL,card.logoURL,card.sigURL,card.macURL].filter(Boolean);
  return Promise.all(urls.map(u=>new Promise(res=>{
    if(imgCache[u]){res();return;}
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>{imgCache[u]=img;res();};
    img.onerror=()=>res();
    img.src=u;
  })));
}

let packOpened=false;
function openPack(){
  if(packOpened)return;packOpened=true;
  const pack=document.getElementById('foilPack');
  const rays=document.getElementById('packRays');
  const particles=document.getElementById('packParticles');
  // Spawn particles flying outward
  if(particles){
    particles.innerHTML='';
    for(let i=0;i<24;i++){
      const s=document.createElement('span');
      const ang=Math.random()*Math.PI*2, dist=120+Math.random()*180;
      s.style.setProperty('--px',Math.cos(ang)*dist+'px');
      s.style.setProperty('--py',Math.sin(ang)*dist+'px');
      s.style.animationDelay=(Math.random()*0.2)+'s';
      particles.appendChild(s);
    }
  }
  // 1. Peel + seam flash
  pack.classList.add('peeling');
  if(rays) rays.classList.add('go');
  setTimeout(()=>{ if(particles) particles.classList.add('go'); },250);
  // 2. Big card reveal with flash
  setTimeout(()=>{
    document.getElementById('packScreen').classList.remove('active');
    packIdx=0;
    showCard(0);
    document.getElementById('revealScreen').classList.add('active');
    // flash
    const flash=document.createElement('div');
    flash.className='reveal-flash go';
    document.body.appendChild(flash);
    setTimeout(()=>flash.remove(),800);
  },900);
}

  CS.data={

    position:card.position||'',team:card.team||'',jerseyNum:card.jerseyNum||'',
    cardNum:card.cardNum||'',division:card.division||'',bats:card.bats||'',
    throws:card.throws||'',height:card.height||'',weight:card.weight||'',
    hometown:card.hometown||'',stats:card.stats||[],
    serialNum:card.serialNum||'',printRun:card.printRun||'',serialPos:card.serialPos||'h',
    showBanner:card.showBanner!==false,
    imgScale:card.imgScale||1,imgOffsetX:card.imgOffsetX||0,imgOffsetY:card.imgOffsetY||0,
    logoScale:card.logoScale||1,logoOffsetX:card.logoOffsetX||0,logoOffsetY:card.logoOffsetY||0,

// Flip on tap (if not dragging)
let wasDragging=false;
document.getElementById('cardHolder').addEventListener('click',()=>{
  if(wasDragging){wasDragging=false;return;}
  CS.flipped=!CS.flipped;animFlip();
});
function animFlip(){
  const t=CS.flipped?1:0,d=t-CS.flipT;
  if(Math.abs(d)<.008){CS.flipT=t;drawCard();return;}
  CS.flipT+=d*.16;drawCard();requestAnimationFrame(animFlip);
}

// ═══════════════════════════════════════════
// TILT (drag or mouse)
// ═══════════════════════════════════════════
function setupTilt(){
  const holder=document.getElementById('cardHolder');
  const canvas=document.getElementById('revealCanvas');
  let dragging=false,sx=0,sy=0,srx=0,sry=0;

  function down(e){dragging=true;wasDragging=false;const t=e.touches?e.touches[0]:e;sx=t.clientX;sy=t.clientY;srx=CS.rotX;sry=CS.rotY;}
  function move(e){
    const t=e.touches?e.touches[0]:e;
    if(dragging){
      const dx=t.clientX-sx,dy=t.clientY-sy;
      if(Math.abs(dx)>4||Math.abs(dy)>4)wasDragging=true;
      CS.rotY=Math.max(-18,Math.min(18,sry+dx*0.18));
      CS.rotX=Math.max(-14,Math.min(14,srx-dy*0.18));
    } else {
      // hover tilt
      const r=canvas.getBoundingClientRect();
      const mx=(t.clientX-r.left)/r.width,my=(t.clientY-r.top)/r.height;
      CS.rotY=(mx-.5)*22;CS.rotX=(.5-my)*16;
    }
    CS.mx=.5+CS.rotY/22*.5;CS.my=.5-CS.rotX/16*.5;
    applyTilt();drawCard();
  }
  function up(){dragging=false;animTiltReturn();}
  holder.addEventListener('mousedown',down);
  window.addEventListener('mousemove',e=>{if(dragging)move(e);});
  holder.addEventListener('mousemove',e=>{if(!dragging)move(e);});
  window.addEventListener('mouseup',up);
  holder.addEventListener('mouseleave',()=>{if(!dragging)animTiltReturn();});
  holder.addEventListener('touchstart',down,{passive:true});
  holder.addEventListener('touchmove',e=>{move(e);},{passive:true});
  holder.addEventListener('touchend',up);
}
function applyTilt(){
  const cv=document.getElementById('revealCanvas');
  cv.style.transform=`rotateX(${CS.rotX}deg) rotateY(${CS.rotY}deg)`;
}
let _traf;
function animTiltReturn(){
  if(_traf)cancelAnimationFrame(_traf);
  function step(){
    CS.rotX+=(0-CS.rotX)*.12;CS.rotY+=(0-CS.rotY)*.12;
    CS.mx=.5+CS.rotY/22*.5;CS.my=.5-CS.rotX/16*.5;
    applyTilt();drawCard();
    if(Math.abs(CS.rotX)>.1||Math.abs(CS.rotY)>.1)_traf=requestAnimationFrame(step);
    else{CS.rotX=0;CS.rotY=0;CS.mx=.5;CS.my=.5;applyTilt();drawCard();}
  }
  step();
}

// drawCard targets the active canvas
function activeCtx(){
  const id=window._activeCanvas||'revealCanvas';
  return document.getElementById(id).getContext('2d');
}


function drawCard(){
  const cv=document.getElementById(window._activeCanvas||'revealCanvas'); if(!cv) return;
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,PW,PH);
  ctx.save();
  const sx=Math.abs(Math.cos(CS.flipT*Math.PI));
  ctx.translate(PW/2,PH/2);
  ctx.scale(Math.max(.015,sx),1);
  ctx.translate(-PW/2,-PH/2);
  if(CS.flipT>0.5){
    try{ drawBack(ctx); }
    catch(e){
      ctx.fillStyle='#d2cec6'; ctx.fillRect(0,0,PW,PH);
      ctx.fillStyle='#333'; ctx.font='24px Oswald,sans-serif';
      ctx.textAlign='center';
      ctx.fillText('Back render error: '+e.message, PW/2, PH/2);
      ctx.textAlign='left';
      console.error('drawBack error:',e);
    }
  } else {
    drawFront(ctx);
  }
  ctx.restore();
}

/* ── Photo mask path (exact shape from layer 03) ── */
function photoMaskPath(ctx){
  ctx.beginPath();
  ctx.moveTo(MASK.x0, MASK.y0);       // notch top  (315, 47)
  ctx.lineTo(MASK.x1, MASK.y1);       // top-right  (663, 47)
  ctx.lineTo(MASK.x2, MASK.y2);       // bot-right  (663, 897)
  ctx.lineTo(MASK.x3, MASK.y3);       // bot-left   (60,  897)
  ctx.lineTo(MASK.x4, MASK.y4);       // notch bot  (60,  100)
  ctx.closePath();                     // diagonal back to (315, 47)
}

/* ── Draw player photo using FRAME as compositor mask ──
   Uses offscreen canvas + destination-in so the photo is ONLY
   visible through the exact transparent hole in layer 04 (frame).
   Eliminates all bleed at the diagonal notch corner. ── */
function drawPhotoLayer(ctx){
  const areaW = MASK.x1-MASK.x4;   // 603
  const areaH = MASK.y2-MASK.y0;   // 850

  // Step 1: draw photo content onto temp canvas (full PSD size)
  const tmp = document.createElement('canvas');
  tmp.width = PW; tmp.height = PH;
  const tc = tmp.getContext('2d');

  if(CS.photoImg){
    const img=CS.photoImg;
    const iw=img.naturalWidth||200, ih=img.naturalHeight||300;
    const baseScale=Math.max(areaW/iw, areaH/ih);
    const sc=baseScale*(CS.data.imgScale||1);
    const dw=iw*sc, dh=ih*sc;
    // Center photo in the mask area + user offsets
    const dx=(MASK.x4+MASK.x1)/2 - dw/2 + (CS.data.imgOffsetX||0);
    const dy=(MASK.y0+MASK.y2)/2 - dh/2 + (CS.data.imgOffsetY||0);
    tc.drawImage(img, dx, dy, dw, dh);
  } else {
    // Placeholder gradient
    const pg=tc.createLinearGradient(MASK.x4,MASK.y0,MASK.x1,MASK.y2);
    pg.addColorStop(0,'#1e2e70'); pg.addColorStop(1,'#0d1545');
    tc.fillStyle=pg;
    tc.fillRect(MASK.x4,MASK.y0,areaW,areaH);
    tc.globalAlpha=0.07;
    tc.font='140px serif'; tc.textAlign='center'; tc.fillStyle='#fff';
    tc.fillText('\u26BE',(MASK.x4+MASK.x1)/2,(MASK.y0+MASK.y2)/2+50);
    tc.globalAlpha=1; tc.textAlign='left';
  }

  // Step 2: clip photo to exact photo polygon using layer03 alpha as mask.
  // LAYERS.photo_mask is a white RGBA image whose alpha = layer03's alpha channel.
  // destination-in keeps photo ONLY where photo_mask has non-zero alpha
  // = exactly the photo polygon (left=60, top=47, right=663, bottom=897 with diagonal notch).
  // This prevents ANY bleed outside the frame.
  tc.globalCompositeOperation = 'destination-in';
  if(LAYERS.photo_mask) tc.drawImage(LAYERS.photo_mask, 0, 0, PW, PH);

  // Step 4: composite final result onto main canvas
  ctx.drawImage(tmp, 0, 0);
}

function drawFront(ctx){
  const par=PAR[CS.parallel]||PAR.base;
  const d=CS.data;
  const fn=(d.firstName||'').toUpperCase();
  const ln=(d.lastName||'PLAYER NAME').toUpperCase();
  const fullName=fn?fn+' '+ln:ln;
  const posText=(d.position||'POSITION').toUpperCase();
  const abbr=((d.team||'').substring(0,3)||'LYB').toUpperCase();

  // ── LAYER 01: Background ──
  if(LAYERS.bg) ctx.drawImage(LAYERS.bg,0,0,PW,PH);

  // ── Parallel tint ──
  if(par.tint){
    const[r,g,b,a]=par.tint;
    ctx.fillStyle=`rgba(${r},${g},${b},${a})`;
    ctx.fillRect(0,0,PW,PH);
  }
  if(par.name==='RAINBOW FOIL') drawRainbow(ctx);
  if(par.name==='HOLO FOIL')    drawHolo(ctx);

  // ── LAYER 02: LYBS banner (toggle) ──
  if((CS.data.showBanner!==false) && LAYERS.banner) ctx.drawImage(LAYERS.banner,0,0,PW,PH);

  // ── LAYER 03: PHOTO — clipped to exact mask shape ──
  drawPhotoLayer(ctx);

  // ── LAYER 04: Player frame (white border, stitch dots, blue bar) ──
  if(LAYERS.frame) ctx.drawImage(LAYERS.frame,0,0,PW,PH);

  // ── LAYER 05: Inner shadow — ON TOP of photo, UNDER frame ──
  // This is the vignette/shadow that overlays the photo edges inside the frame
  if(LAYERS.shadow){
    ctx.save();
    photoMaskPath(ctx);
    ctx.clip();
    ctx.drawImage(LAYERS.shadow,0,0,PW,PH);
    ctx.restore();
  }

  // ── LAYER 06: Logo circle chrome ──
  if(LAYERS.logo) ctx.drawImage(LAYERS.logo,0,0,PW,PH);
  if(CS.logoImg){
    const lcx=163, lcy=891, lr=72;
    ctx.save();
    ctx.beginPath(); ctx.arc(lcx,lcy,lr,0,Math.PI*2);
    ctx.fillStyle='#ffffff'; ctx.fill();
    ctx.clip();
    const li=CS.logoImg;
    const iw=li.naturalWidth||100, ih=li.naturalHeight||100;
    const baseScL=Math.max((lr*2)/iw,(lr*2)/ih);
    const scL=baseScL*(CS.data.logoScale||1);
    ctx.drawImage(li,lcx-(iw*scL)/2+(CS.data.logoOffsetX||0),lcy-(ih*scL)/2+(CS.data.logoOffsetY||0),iw*scL,ih*scL);
    ctx.restore();
  }

  // ── LAYER 07: POSITION — Michroma italic, all caps, drop shadow ──
  ctx.save();
  let pfs=24;
  ctx.font=`italic ${pfs}px Michroma,sans-serif`;
  while(ctx.measureText(posText).width>POS_MAXW&&pfs>11){pfs--;ctx.font=`italic ${pfs}px Michroma,sans-serif`;}
  ctx.textAlign='left'; ctx.lineJoin='round';
  // Dark drop shadow layers
  ctx.shadowColor='rgba(0,0,0,0.5)';
  ctx.shadowBlur=4;
  ctx.shadowOffsetX=1;
  ctx.shadowOffsetY=1;
  ctx.fillStyle='rgba(235,235,240,0.92)';
  ctx.fillText(posText,POS_X,POS_Y);
  ctx.shadowColor='transparent';
  ctx.shadowBlur=0;
  ctx.shadowOffsetX=0;
  ctx.shadowOffsetY=0;
  ctx.restore();

  // ── LAYER 08: PLAYER NAME — Anton (Hackensack-style), bold italic, all caps ──
  ctx.save();
  let nfs=58;
  ctx.font=`italic ${nfs}px Anton,sans-serif`;
  while(ctx.measureText(fullName).width>NAME_MAXW&&nfs>22){nfs-=2;ctx.font=`italic ${nfs}px Anton,sans-serif`;}
  ctx.textAlign='left'; ctx.lineJoin='round';
  // Soft drop shadow — single offset, light opacity
  ctx.shadowColor='rgba(0,0,0,0.65)';
  ctx.shadowBlur=6;
  ctx.shadowOffsetX=2;
  ctx.shadowOffsetY=2;
  ctx.fillStyle='#ffffff';
  ctx.fillText(fullName,NAME_X,NAME_Y);
  // Reset shadow
  ctx.shadowColor='transparent';
  ctx.shadowBlur=0;
  ctx.shadowOffsetX=0;
  ctx.shadowOffsetY=0;
  ctx.restore();

  // ── SIGNATURE BOX (auto parallel) ──
  if(CS.parallel==='auto') drawAutoBox(ctx);

  // ── LAYER 09: Corner badge (mac or custom) ──
  if(CS.macImg){ ctx.save();ctx.drawImage(CS.macImg,565,47,85,91);ctx.restore(); } else if(LAYERS.mac) ctx.drawImage(LAYERS.mac,0,0,PW,PH);

  // ── GOLD NUMBERED embossment ──
  if(par.name==='GOLD NUMBERED') drawGoldEmbossment(ctx);

  // ── GLOSS ──
  drawGloss(ctx,par);

  // ── CRACKED ICE full-card prismatic overlay (after everything) ──
  if(par.name==='CRACKED ICE') drawIceOverlay(ctx);
}

/* ── Rainbow ── */
function drawRainbow(ctx){
  const mx=CS.mx,my=CS.my,off=mx*300+my*150;
  const rg=ctx.createLinearGradient(off,0,off+PW*1.2,PH);
  rg.addColorStop(0,'rgba(255,0,80,0.38)');rg.addColorStop(.14,'rgba(255,120,0,0.35)');
  rg.addColorStop(.28,'rgba(255,220,0,0.32)');rg.addColorStop(.42,'rgba(0,220,80,0.35)');
  rg.addColorStop(.57,'rgba(0,120,255,0.38)');rg.addColorStop(.71,'rgba(120,0,255,0.35)');
  rg.addColorStop(.85,'rgba(255,0,180,0.35)');rg.addColorStop(1,'rgba(255,0,80,0.38)');
  ctx.fillStyle=rg;ctx.fillRect(0,0,PW,PH);
}
/* ── Holo ── */
function drawHolo(ctx){
  const mx=CS.mx,my=CS.my,sz=8;
  for(let y=0;y<PH;y+=sz){for(let x=0;x<PW;x+=sz){
    const dist=Math.sqrt(((x/PW)-mx)**2+((y/PH)-my)**2);
    const hue=((x+y)*1.6+mx*180+my*120)%360;
    const alpha=0.07+0.11*(1-Math.min(dist*2,1));
    ctx.fillStyle=`hsla(${hue},100%,60%,${alpha})`;
    ctx.fillRect(x,y,sz-1,sz-1);
  }}
}
/* ── Gloss ── */
function drawGloss(ctx,par){
  // Derive light pos from physical card tilt angle
  const mx=0.5+CS.rotY/28*0.6, my=0.5-CS.rotX/20*0.6;
  const sx=mx*PW, sy=my*PH;
  const gl=ctx.createLinearGradient(sx*.5,sy*.1,PW,PH);
  gl.addColorStop(0,'rgba(255,255,255,0.13)');gl.addColorStop(.4,'rgba(255,255,255,0.03)');gl.addColorStop(1,'rgba(0,0,0,0.04)');
  ctx.fillStyle=gl;ctx.fillRect(0,0,PW,PH);
  // (specular spotlight removed)
  const ev=ctx.createRadialGradient(PW/2,PH/2,PH*.3,PW/2,PH/2,PH*.75);
  ev.addColorStop(0,'rgba(0,0,0,0)');ev.addColorStop(1,'rgba(0,0,0,0.2)');
  ctx.fillStyle=ev;ctx.fillRect(0,0,PW,PH);
  if(['RAINBOW FOIL','HOLO FOIL'].includes(par.name)){
    const ang=mx*.6-.2,bx2=Math.cos(ang),by2=Math.sin(ang);
    const pb=ctx.createLinearGradient(sx-bx2*250,sy-by2*250,sx+bx2*250,sy+by2*250);
    pb.addColorStop(0,'rgba(255,255,255,0)');pb.addColorStop(.46,'rgba(255,255,255,0)');
    pb.addColorStop(.49,'rgba(255,255,255,0.22)');pb.addColorStop(.50,'rgba(255,255,255,0.40)');
    pb.addColorStop(.51,'rgba(255,255,255,0.22)');pb.addColorStop(.54,'rgba(255,255,255,0)');
    pb.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=pb;ctx.fillRect(0,0,PW,PH);
  }
}

/* ── Card back ── portrait, mirrors front sidebar, clean Topps layout ── */
function drawBack(ctx){
  const d=CS.data, par=PAR[CS.parallel]||PAR.base;
  const fn=(d.firstName||'').toUpperCase(), ln=(d.lastName||'PLAYER').toUpperCase();
  const fullName=fn?fn+' '+ln:ln;
  const abbr=((d.team||'LYBS').substring(0,3)).toUpperCase();
  const g=par.glow; const [pr,pg,pb]=g?g:[80,110,200];

  // ── Rotate canvas 90° → landscape drawing space is 1000×712 ──
  ctx.save();
  ctx.translate(PW,0);
  ctx.rotate(Math.PI/2);
  const LW=PH,LH=PW; // 1000×712

  // ══ BACKGROUND: woven texture (same as front) ══
  ctx.fillStyle='#d2cec6'; ctx.fillRect(0,0,LW,LH);
  if(LAYERS.bg){
    try{ctx.globalAlpha=0.85;ctx.drawImage(LAYERS.bg,0,0,LW,LH);ctx.globalAlpha=1;}catch(e){}
  }
  // Knit rows
  for(let y=0;y<LH;y+=3){
    ctx.fillStyle=y%6===0?'rgba(0,0,0,0.05)':'rgba(255,255,255,0.04)';
    ctx.fillRect(0,y,LW,2);
  }
  // White overlay L→R (same as front bg)
  const wo=ctx.createLinearGradient(0,0,LW,0);
  wo.addColorStop(0,'rgba(255,255,255,0)');
  wo.addColorStop(0.4,'rgba(255,255,255,0.2)');
  wo.addColorStop(1,'rgba(255,255,255,0.7)');
  ctx.fillStyle=wo;ctx.fillRect(0,0,LW,LH);

  // ══ SIDEBARS: top & bottom strips (match front banner style) ══
  const SH=52;
  // Dark woven sidebar base
  ctx.fillStyle='#1e2028';ctx.fillRect(0,0,LW,SH);
  ctx.fillStyle='#1e2028';ctx.fillRect(0,LH-SH,LW,SH);
  // Knit texture on strips
  for(let x=0;x<LW;x+=4){
    ctx.fillStyle='rgba(255,255,255,0.03)';
    ctx.fillRect(x,0,1,SH); ctx.fillRect(x,LH-SH,1,SH);
  }
  // Blue accent lines
  ctx.fillStyle=`rgba(${pr},${pg},${pb},0.7)`;
  ctx.fillRect(0,8,LW,3); ctx.fillRect(0,SH-11,LW,3);
  ctx.fillRect(0,LH-SH+8,LW,3); ctx.fillRect(0,LH-11,LW,3);
  // White divider
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.fillRect(0,SH-1,LW,1); ctx.fillRect(0,LH-SH,LW,1);
  // X-stitch
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=0.9;
  for(let x=12;x<LW-12;x+=14){
    [SH-20, LH-SH+20].forEach(cy=>{
      ctx.beginPath();ctx.moveTo(x-2.5,cy-2.5);ctx.lineTo(x+2.5,cy+2.5);
      ctx.moveTo(x+2.5,cy-2.5);ctx.lineTo(x-2.5,cy+2.5);ctx.stroke();
    });
  }

  // ══ INNER FRAME ══
  const FX=16,FY=SH+6,FW=LW-32,FH=LH-SH*2-12,FR=6;
  // Shadow
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.2)';ctx.shadowBlur=6;
  rr2(ctx,FX,FY,FW,FH,FR);ctx.strokeStyle='rgba(0,0,0,0.08)';ctx.lineWidth=2;ctx.stroke();
  ctx.restore();
  // White-grey gradient frame
  const ff=ctx.createLinearGradient(FX,FY,FX+FW,FY+FH);
  ff.addColorStop(0,'rgba(255,255,255,0.92)');ff.addColorStop(.5,'rgba(245,245,250,0.78)');
  ff.addColorStop(1,'rgba(195,195,210,0.55)');
  rr2(ctx,FX,FY,FW,FH,FR);ctx.strokeStyle=ff;ctx.lineWidth=1.5;ctx.stroke();
  // Inner hairline
  rr2(ctx,FX+2,FY+2,FW-4,FH-4,FR-1);
  ctx.strokeStyle='rgba(0,0,0,0.05)';ctx.lineWidth=0.5;ctx.stroke();
  // Stitch dots on top inner border
  for(let sx2=FX+16;sx2<FX+FW-10;sx2+=10){
    ctx.beginPath();ctx.arc(sx2,FY+4,1.8,0,Math.PI*2);
    ctx.fillStyle='rgba(155,160,178,0.55)';ctx.fill();
  }

  // ══ HEADER: card# | name banner | team logo ══
  const CY=FY+12, CX2=FX+12, CW2=FW-24;
  const HDR_H=44;

  // Card number
  ctx.font='bold 24px Oswald,sans-serif';ctx.fillStyle='#1a1a1a';
  ctx.fillText('#'+(d.cardNum||'—'),CX2,CY+HDR_H-10);

  // Name banner (center)
  const nbW=Math.min(380,CW2-200), nbH=HDR_H, nbX=CX2+72+(CW2-200-nbW)/2, nbY=CY;
  const nb=ctx.createLinearGradient(nbX,nbY,nbX+nbW,nbY+nbH);
  nb.addColorStop(0,`rgba(${Math.min(pr+50,255)},${Math.min(pg+70,255)},${Math.min(pb+90,255)},0.95)`);
  nb.addColorStop(.45,`rgba(${pr},${pg},${pb},0.92)`);
  nb.addColorStop(1,`rgba(${Math.floor(pr*.55)},${Math.floor(pg*.6)},${Math.floor(pb*.7)},0.95)`);
  rr2(ctx,nbX,nbY,nbW,nbH,4);ctx.fillStyle=nb;ctx.fill();
  for(let i=0;i<nbH;i+=2){ctx.fillStyle='rgba(0,0,0,0.08)';ctx.fillRect(nbX,nbY+i,nbW,1);}
  ctx.fillStyle='rgba(255,255,255,0.22)';ctx.fillRect(nbX,nbY,nbW,1);
  let nfs=22;ctx.font=`italic ${nfs}px Anton,sans-serif`;
  while(ctx.measureText(fullName).width>nbW-20&&nfs>12){nfs--;ctx.font=`italic ${nfs}px Anton,sans-serif`;}
  ctx.textAlign='center';
  ctx.strokeStyle='rgba(0,0,0,0.8)';ctx.lineWidth=5;ctx.lineJoin='round';
  ctx.strokeText(fullName,nbX+nbW/2,nbY+nbH-9);
  ctx.fillStyle='#fff';ctx.fillText(fullName,nbX+nbW/2,nbY+nbH-9);
  ctx.textAlign='left';

  // Team logo — top right (use front logo style)
  const lrx=FX+FW-72, lry=CY, lrR=36;
  if(CS.logoImg){
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(lrx+lrR,lry+lrR,lrR,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();ctx.shadowBlur=0;
    ctx.beginPath();ctx.arc(lrx+lrR,lry+lrR,lrR-4,0,Math.PI*2);
    ctx.strokeStyle=`rgb(${pr},${pg},${pb})`;ctx.lineWidth=3;ctx.stroke();
    ctx.clip();
    const li=CS.logoImg,iw=li.naturalWidth||100,ih=li.naturalHeight||100;
    const scL=Math.max(((lrR-4)*2)/iw,((lrR-4)*2)/ih)*(CS.data.logoScale||1);

  ctx.beginPath();ctx.moveTo(CX2,cy);ctx.lineTo(FX+FW-12,cy);ctx.stroke();
  cy+=6;

  // ══ BATTING RECORD TITLE ══
  const TW=FW-24;
  ctx.fillStyle='#1a1a1a';ctx.fillRect(CX2,cy,TW,19);
  ctx.fillStyle=`rgb(${pr},${pg},${pb})`;ctx.fillRect(CX2,cy,TW,19);
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(CX2,cy,TW,19);

  ctx.fillStyle='rgba(255,255,255,0.22)';ctx.fillRect(CX2,cy,TW,1);
  ctx.font='bold 10.5px Oswald,sans-serif';ctx.fillStyle='#fff';

  // ══ STATS TABLE ══

  ctx.fillStyle=`rgba(${pr},${pg},${pb},0.12)`;ctx.fillRect(CX2,cy,TW,14);

    });

  });

  // Totals row
  if((d.stats||[]).length){
    ctx.fillStyle=`rgb(${pr},${pg},${pb})`;ctx.fillRect(CX2,cy,TW,15);

    ctx.textAlign='center';ctx.fillText('No stats recorded yet',CX2+TW/2,cy+11);

      if(ctx.measureText(test).width>TW-4&&line){

  if(CS.parallel==='auto'&&CS.sigImg&&cy+45<FY+FH-24){
    ctx.fillStyle='rgba(255,255,255,0.94)';rr2(ctx,CX2,cy,TW,42,3);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=0.5;ctx.stroke();
    const si=CS.sigImg,sc2=Math.min((TW-10)/(si.naturalWidth||100),(42-10)/(si.naturalHeight||50));
    ctx.drawImage(si,CX2+5+(TW-10-(si.naturalWidth||100)*sc2)/2,cy+5,
      (si.naturalWidth||100)*sc2,(si.naturalHeight||50)*sc2);

  // ══ FOOTER ══
  const footY=FY+FH-26;

  // Parallel badge
  if(g){ctx.font='bold 9px Michroma,sans-serif';ctx.fillStyle=`rgb(${g[0]},${g[1]},${g[2]})`;
    ctx.fillText(par.name,CX2,footY+10);}
  ctx.font='400 7px Oswald,sans-serif';ctx.fillStyle='#aaa';

  ctx.fillText('® & © 2026 LYBS CARD SERIES · OFFICIAL VIRTUAL TRADING CARD · SERIES ONE',LW/2,footY+20);
  ctx.textAlign='left';

  // Laminate gloss
  const gl=ctx.createLinearGradient(0,0,LW,LH);
  gl.addColorStop(0,'rgba(255,255,255,0.1)');gl.addColorStop(1,'rgba(0,0,0,0.04)');
  ctx.fillStyle=gl;ctx.fillRect(0,0,LW,LH);

  ctx.restore(); // end 90° rotation
}


function rr2(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

/* ── Download front/back ── */
function downloadCard(side){
  // Step 1: render to offscreen canvas
  const tmp=document.createElement('canvas');
  tmp.width=PW; tmp.height=PH;
  const tctx=tmp.getContext('2d');
  const mx0=CS.mx, my0=CS.my;
  CS.mx=0.5; CS.my=0.5;  // neutral gloss for export
  try {
    if(side==='front') drawFront(tctx);
    else               drawBack(tctx);
  } catch(drawErr) {
    CS.mx=mx0; CS.my=my0;
    showToast('Render error: '+drawErr.message, true);
    return;
  }
  CS.mx=mx0; CS.my=my0;

  // Step 2: get data URL (may fail if canvas tainted by cross-origin image)
  let dataUrl;
  try {
    dataUrl = tmp.toDataURL('image/png');
  } catch(corsErr) {
    // Canvas tainted — fall back to using the live main canvas instead
    // (only works for whichever side is currently shown)
    const cv = document.getElementById(window._activeCanvas||'revealCanvas');
    try { dataUrl = cv.toDataURL('image/png'); }
    catch(e2) {
      showToast('Export blocked by browser. Try right-clicking the card to save.', true);
      return;
    }
  }

  // Step 3: trigger download
  const name=(CS.data.lastName||'PLAYER').toUpperCase().replace(/\s+/g,'_');
  const filename=`LYBS_${name}_${side.toUpperCase()}_${CS.parallel}.png`;
  const a=document.createElement('a');
  a.href=dataUrl;
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ try{document.body.removeChild(a);}catch(e){} }, 200);
  showToast(`✓ Downloading ${side} card…`);
}

/* ═══════════════════════════════════════════
   SIGNATURE PAD
═══════════════════════════════════════════ */
function initSigPad(){
  const pad = document.getElementById('sigPad');
  if(!pad || pad._ready) return;
  pad._ready = true;
  const ctx = pad.getContext('2d');
  let drawing=false, lx=0, ly=0, hasMark=false;

  function pos(e){
    const r=pad.getBoundingClientRect();
    const sx=pad.width/r.width, sy=pad.height/r.height;
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-r.left)*sx, y:(src.clientY-r.top)*sy};
  }
  function start(e){
    drawing=true;
    const p=pos(e); lx=p.x; ly=p.y;
    // Hide hint
    const hint=document.getElementById('sigPadHint');
    if(hint) hint.classList.add('gone');
    e.preventDefault();
  }
  function move(e){
    if(!drawing) return;
    const p=pos(e);
    ctx.beginPath();
    ctx.moveTo(lx,ly);
    ctx.lineTo(p.x,p.y);
    ctx.strokeStyle='#1a1a8a';
    ctx.lineWidth=3.5;
    ctx.lineCap='round';
    ctx.lineJoin='round';
    ctx.stroke();
    lx=p.x; ly=p.y;
    hasMark=true;
    // Live-update card preview
    liveUpdateSig();
    e.preventDefault();
  }
  function end(){ drawing=false; }

  pad.addEventListener('mousedown',start);
  pad.addEventListener('mousemove',move);
  pad.addEventListener('mouseup',end);
  pad.addEventListener('mouseleave',end);
  pad.addEventListener('touchstart',start,{passive:false});
  pad.addEventListener('touchmove',move,{passive:false});
  pad.addEventListener('touchend',end);
}

function liveUpdateSig(){
  const pad=document.getElementById('sigPad');
  if(!pad) return;
  const img=new Image();
  img.onload=()=>{ CS.sigImg=img; qR(); };
  img.src=pad.toDataURL('image/png');
}

function clearSigPad(){
  const pad=document.getElementById('sigPad');
  if(!pad) return;
  pad.getContext('2d').clearRect(0,0,pad.width,pad.height);
  pad._ready=false;
  CS.sigImg=null; sD='';
  const hint=document.getElementById('sigPadHint');
  if(hint) hint.classList.remove('gone');
  qR();
  // Re-init so events still work
  setTimeout(initSigPad,10);
}

function useSigPad(){
  liveUpdateSig();
  showToast('✓ Signature applied');
}

function showSigTab(tab){

/* ── Gold Foil Embossment (Numbered cards) ── */
function drawGoldEmbossment(ctx){
  const serial=parseInt(CS.data.serialNum)||1;
  const total =parseInt(CS.data.printRun)||50;
  const isVert=(CS.data.serialPos==='v');
  const padded=String(serial).padStart(String(total).length,'0');
  const text=padded+'/'+total;
  const fs=21;
  // Tilt-driven light direction (normalized -1..1)
  const lx=CS.rotY/14, ly=-CS.rotX/10;

  ctx.save();
  ctx.font=`bold ${fs}px "Courier New",Courier,monospace`;
  ctx.textBaseline='alphabetic';

  const ox=78, oy=130;
  ctx.translate(ox,oy);
  if(isVert) ctx.rotate(Math.PI/2);

  // Light vector for emboss (where the raised edge catches light)
  // Default light upper-left; shifts as card tilts
  const lightX=-1.2 - lx*1.5;
  const lightY=-1.2 + ly*1.5;
  const darkX = 1.2 + lx*1.5;
  const darkY = 1.2 - ly*1.5;

  let xCursor=0;
  text.split('').forEach((ch,i)=>{
    // Very slight per-character wheel misalignment (±1px max)
    const jitter=Math.sin(i*12.9+serial*0.37)*0.9;
    const cy=jitter;
    const cw=ctx.measureText(ch).width;

    // ── EMBOSS EFFECT (pressed into card) ──
    // 1. Far shadow side (recessed edge — darker, lower-right)
    ctx.fillStyle='rgba(60,40,0,0.55)';
    ctx.fillText(ch, xCursor+darkX, cy+darkY);
    // 2. Light catch side (raised edge — bright, upper-left)
    ctx.fillStyle='rgba(255,250,200,0.65)';
    ctx.fillText(ch, xCursor+lightX, cy+lightY);

    // 3. Gold foil face — gradient shifts with tilt
    const gold=ctx.createLinearGradient(xCursor,-fs+1+ly*7,xCursor,2-ly*7);
    gold.addColorStop(0,   `rgba(255,248,170,${0.85+Math.abs(lx)*0.15})`);
    gold.addColorStop(0.32,'#f0c02c');
    gold.addColorStop(0.62,'#c5840e');
    gold.addColorStop(1,   '#9a6000');
    ctx.fillStyle=gold;
    ctx.fillText(ch, xCursor, cy);

    // 4. Specular foil flash (tilt-reactive sweep across the metal)
    const sp=Math.min(Math.abs(lx)*0.6+Math.abs(ly)*0.32, 0.7);
    if(sp>0.05){
      ctx.fillStyle=`rgba(255,255,235,${sp})`;
      ctx.fillText(ch, xCursor-lx*1.5, cy-Math.abs(ly)*1.2);
    }
    xCursor+=cw;
  });
  ctx.restore();
}

/* ── Cracked Ice overlay — independent zone shimmer ── */

/* ── Cracked Ice — prismatic triangle facets ──
   Seeded jittered grid → irregular triangles, each with
   unique phase/hue. Screen-blend as tilt aligns with phase. ── */
let _ICE_FACETS=null;
function _buildIceFacets(){
  let s=31415;
  function r(){s=(s*1664525+1013904223)>>>0;return(s>>>0)/4294967295;}
  const COLS=11,ROWS=16,facets=[];
  const gw=PW/COLS,gh=PH/ROWS;
  // Jittered grid points
  const pts=[];
  for(let row=-1;row<=ROWS+1;row++) for(let col=-1;col<=COLS+1;col++)
    pts.push({x:col*gw+(r()-.5)*gw*.75,y:row*gh+(r()-.5)*gh*.75});
  const pc=COLS+3;
  for(let row=0;row<ROWS+1;row++) for(let col=0;col<COLS+1;col++){
    const i=row*pc+col;
    const tl=pts[i],tr=pts[i+1],bl=pts[i+pc],br=pts[i+pc+1];
    if(!tl||!tr||!bl||!br) continue;
    [
      [tl,tr,bl],
      [tr,br,bl]
    ].forEach(verts=>{
      facets.push({
        verts,
        phase:r()*360,
        hue:r()*360,
        sat:88+r()*12,
        peak:0.45+r()*0.55,
        bw:12+r()*32
      });
    });
  }
  return facets;
}

function drawIceOverlay(ctx){
  if(!_ICE_FACETS) _ICE_FACETS=_buildIceFacets();
  ctx.save();
  const ry=CS.rotY||0,rx=CS.rotX||0;
  const tilt=Math.min(Math.sqrt((ry/14)**2+(rx/10)**2),1);
  const tiltDir=((Math.atan2(rx,ry)*180/Math.PI)+360)%360;

  // ── Always-on crystalline structure (very faint) ──
  ctx.globalCompositeOperation='source-over';
  ctx.strokeStyle='rgba(160,165,200,0.05)';
  ctx.lineWidth=0.5;
  _ICE_FACETS.forEach(f=>{
    ctx.beginPath();
    ctx.moveTo(f.verts[0].x,f.verts[0].y);
    f.verts.slice(1).forEach(v=>ctx.lineTo(v.x,v.y));
    ctx.closePath(); ctx.stroke();
  });

  if(tilt<0.03){ctx.restore();return;}

  // ── Prismatic facets — light up when tilt aligns with phase ──
  ctx.globalCompositeOperation='screen';
  _ICE_FACETS.forEach(f=>{
    const diff=((tiltDir-f.phase+540)%360)-180;  // -180..180
    const cf=Math.exp(-(diff*diff)/(f.bw*f.bw))*tilt*f.peak;
    if(cf<0.015) return;
    // Hue shifts with tilt direction so colors change as card rotates
    const hue=(f.hue+tiltDir*1.2+360)%360;
    ctx.globalAlpha=cf;
    ctx.fillStyle=`hsl(${hue},${f.sat}%,68%)`;
    ctx.beginPath();
    ctx.moveTo(f.verts[0].x,f.verts[0].y);
    f.verts.slice(1).forEach(v=>ctx.lineTo(v.x,v.y));
    ctx.closePath(); ctx.fill();
    // Bright edge on each lit facet
    ctx.globalAlpha=cf*0.4;
    ctx.strokeStyle=`hsl(${hue},100%,88%)`;
    ctx.lineWidth=0.6;
    ctx.stroke();
  });

  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
  ctx.restore();
}

async function loadSavedIds(){
  if(!currentUser)return;
  try{
    const snap=await window._db.collection('collections').doc(currentUser.uid)
      .collection('cards').get();
    savedIds=new Set();snap.forEach(d=>savedIds.add(d.id));
    updateSaveBtn();
  }catch(e){console.error(e);}
}
function updateSaveBtn(){
  const btn=document.getElementById('saveBtn');
  const card=PACK[packIdx];if(!card){return;}
  if(savedIds.has(card.id)){
    btn.textContent='✓ IN COLLECTION';btn.classList.add('saved');btn.disabled=true;
  } else {
    btn.textContent='★ SAVE TO COLLECTION';btn.classList.remove('saved');btn.disabled=false;
  }
}

async function saveToCollection(){
  if(!firebaseConfigured()){
    // Demo mode — show the slab animation but explain saving needs setup
    playSlabAnimation(()=>{},PACK[packIdx]);
    setTimeout(()=>showToast('Demo mode — connect Firebase to save permanently'),2300);
    return;
  }
  if(!currentUser){openAuth();showToast('Sign in to save cards');return;}
  const card=PACK[packIdx];if(!card)return;
  if(savedIds.has(card.id)){return;}

  // Slab animation
  playSlabAnimation(()=>{},card);

  // Persist
  try{
    await window._db.collection('collections').doc(currentUser.uid)
      .collection('cards').doc(card.id).set({
        ...card, savedAt:new Date().toISOString(), ownerUid:currentUser.uid
      });
    savedIds.add(card.id);
    updateSaveBtn();
  }catch(e){console.error(e);showToast('Save failed: '+e.message);}
}

function playSlabAnimation(cb,card){
  const ov=document.getElementById('slabOverlay');
  const slab=document.getElementById('slab');
  // Render current card to slab canvas
  window._activeCanvas='slabCanvas';
  const prevFlip=CS.flipped,prevFlipT=CS.flipT,prevRX=CS.rotX,prevRY=CS.rotY;
  CS.flipped=false;CS.flipT=0;CS.rotX=0;CS.rotY=0;CS.mx=.5;CS.my=.5;
  drawCard();
  window._activeCanvas='revealCanvas';
  CS.flipped=prevFlip;CS.flipT=prevFlipT;CS.rotX=prevRX;CS.rotY=prevRY;

  ov.classList.add('active');
  slab.classList.remove('animate');void slab.offsetWidth;slab.classList.add('animate');
  setTimeout(()=>{
    ov.classList.remove('active');
    showToast('★ Added to your collection');
    if(cb)cb();
  },2200);
}

// ═══════════════════════════════════════════
// COLLECTION / DISPLAY CASE
// ═══════════════════════════════════════════
async function showCase(){
  if(!currentUser){openAuth();return;}
  document.getElementById('packScreen').classList.remove('active');
  document.getElementById('revealScreen').classList.remove('active');
  document.getElementById('caseScreen').classList.add('active');
  const grid=document.getElementById('caseGrid');
  grid.innerHTML='<div class="case-empty">Loading…</div>';
  try{
    const snap=await window._db.collection('collections').doc(currentUser.uid)
      .collection('cards').orderBy('savedAt','desc').get();
    const cards=[];snap.forEach(d=>cards.push({id:d.id,...d.data()}));
    document.getElementById('caseCount').textContent=`${cards.length} CARD${cards.length!==1?'S':''}`;
    if(cards.length===0){grid.innerHTML='<div class="case-empty">No cards yet — open a pack and save some!</div>';return;}
    grid.innerHTML='';
    // Preload + render each as thumbnail
    for(const card of cards){
      await preloadCardImages(card);
      const div=document.createElement('div');div.className='case-card';
      const cv=document.createElement('canvas');cv.width=712;cv.height=1000;
      div.appendChild(cv);
      const par=PAR[card.parallel||card.rarity]||PAR.base;const g=par.glow;
      const tag=document.createElement('div');tag.className='cc-par';
      tag.textContent=par.name;tag.style.background=g?`rgb(${g[0]},${g[1]},${g[2]})`:'#888';
      div.appendChild(tag);
      div.onclick=()=>viewCaseCard(card);
      grid.appendChild(div);
      // Render front into this canvas
      renderCardTo(cv,card);
    }
  }catch(e){console.error(e);grid.innerHTML='<div class="case-empty">Error loading collection</div>';}
}

function renderCardTo(canvas,card){
  // Temporarily load card into CS, draw front to given canvas
  const saved={...CS};
  loadCardIntoCS(card);
  CS.flipped=false;CS.flipT=0;CS.rotX=0;CS.rotY=0;CS.mx=.5;CS.my=.5;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,PW,PH);
  try{drawFront(ctx);}catch(e){console.error('render err',e);}
  // restore
  Object.assign(CS,saved);
}

function viewCaseCard(card){
  // Jump back to reveal-style viewer for a single owned card
  PACK=[card];packIdx=0;
  document.getElementById('caseScreen').classList.remove('active');
  document.getElementById('revealScreen').classList.add('active');
  window._activeCanvas='revealCanvas';
  showCard(0);
  // Hide save (already owned), could show TRADE here
  const btn=document.getElementById('saveBtn');
  btn.textContent='⇄ TRADE THIS CARD';btn.classList.remove('saved');btn.disabled=false;
  btn.onclick=()=>initiateTrade(card);
}

// ═══════════════════════════════════════════
// TRADING (basic offer flow)
// ═══════════════════════════════════════════
async function initiateTrade(card){
  if(!currentUser){openAuth();return;}
  const toEmail=prompt('Enter the email of the user you want to trade with:');
  if(!toEmail)return;
  try{
    // Create a trade offer doc
    await window._db.collection('trades').add({
      fromUid:currentUser.uid,
      fromEmail:currentUser.email,
      toEmail:toEmail.trim().toLowerCase(),
      cardId:card.id,
      cardData:card,
      status:'pending',
      createdAt:new Date().toISOString()
    });
    showToast('Trade offer sent to '+toEmail);
  }catch(e){console.error(e);showToast('Trade failed: '+e.message);}
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);
}

</script>
